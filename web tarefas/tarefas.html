<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📝 Lista de Tarefas</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --bg:         #1e1e2e;
    --bg2:        #2a2a3d;
    --header:     #13131f;
    --entrada-bg: #2e2e45;
    --borda:      #3a3a55;
    --accent:     #7c6af7;
    --accent2:    #e74c3c;
    --fg:         #e2e2f0;
    --fg2:        #8888aa;
    --fg-ok:      #4caf82;
    --fg-warn:    #f39c12;
    --cor-diario: #3a6baf;
    --cor-semanal:#7a3faf;
    --cor-alta:   #e74c3c;
    --cor-media:  #f39c12;
    --cor-baixa:  #4caf82;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: 'Syne', sans-serif;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    background: var(--header);
    border-bottom: 1px solid var(--borda);
    position: sticky; top: 0; z-index: 100;
  }

  .app {
    width: 100%; max-width: 680px;
    display: flex; flex-direction: column;
    height: calc(100vh - 62px);
    overflow: hidden;
  }

  /* Tabs */
  .tabs { display: flex; justify-content: center; border-bottom: 1px solid var(--borda); flex-shrink: 0; overflow-x: auto; }
  .tab-btn {
    padding: 9px 16px; border: none;
    background: var(--tab-inativa); color: var(--fg2);
    font-family: 'Syne', sans-serif; font-size: .85rem; font-weight: 600;
    cursor: pointer; transition: background .15s, color .15s;
    border-right: 1px solid var(--borda); white-space: nowrap;
  }
  .tab-btn:hover { background: var(--borda); color: var(--fg); }
  .tab-btn.ativa { background: var(--accent); color: #fff; }

  /* Panels */
  .panel { display: none; flex: 1; flex-direction: column; padding: 12px 14px; gap: 9px; overflow: hidden; }
  .panel.ativo { display: flex; }

  /* Entrada */
  .entrada-group {
    background: var(--bg2); border: 1px solid var(--borda);
    border-radius: 10px; padding: 11px 13px;
    display: flex; flex-direction: column; gap: 7px; flex-shrink: 0;
  }
  .linha-input { display: flex; gap: 7px; }
  .linha-input input {
    flex: 1; background: var(--entrada-bg); border: none; border-radius: 7px;
    padding: 9px 11px; font-family: 'Syne', sans-serif; font-size: .93rem; color: var(--fg); outline: none;
  }
  .linha-input input:focus { outline: 2px solid var(--accent); }
  .btn-add {
    background: var(--accent); color: #fff; border: none; border-radius: 7px;
    padding: 9px 15px; font-family: 'Syne', sans-serif; font-size: .88rem; font-weight: 700;
    cursor: pointer; white-space: nowrap; transition: background .15s;
  }
  .btn-add:hover { background: #6a5ae0; }

  .radio-row { display: flex; align-items: center; gap: 3px; flex-wrap: wrap; }
  .radio-row > label { font-size: .8rem; color: var(--fg2); margin-right: 5px; }
  .radio-opt { display: flex; align-items: center; cursor: pointer; }
  .radio-opt input[type=radio] { display: none; }
  .radio-opt span {
    font-size: .8rem; padding: 2px 8px; border-radius: 20px;
    border: 1px solid transparent; transition: all .12s; cursor: pointer; user-select: none;
  }
  .radio-opt input:checked + span { font-weight: 700; border-color: currentColor; }
  .rep-sem    { color: var(--fg2); }
  .rep-diario { color: var(--cor-diario); }
  .rep-semanal{ color: var(--cor-semanal); }
  .pri-alta   { color: var(--cor-alta); }
  .pri-media  { color: var(--cor-media); }
  .pri-baixa  { color: var(--cor-baixa); }

  /* Status */
  .status-txt { font-size: .78rem; color: var(--fg2); font-family: 'JetBrains Mono', monospace; flex-shrink: 0; }
  hr.sep { border: none; border-top: 1px solid var(--borda); flex-shrink: 0; }

  /* Lista */
  .lista-scroll { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 7px; padding-right: 2px; }

  .card {
    background: var(--bg2); border-radius: 10px; padding: 9px 11px 7px;
    border: 1px solid var(--borda);
    border-left-width: 3px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .card[data-prior="Alta"]  { border-left-color: var(--cor-alta); }
  .card[data-prior="Média"] { border-left-color: var(--cor-media); }
  .card[data-prior="Baixa"] { border-left-color: var(--cor-baixa); }
  .card.concluida { opacity: .55; border-left-color: var(--borda) !important; }

  .card-topo { display: flex; align-items: flex-start; gap: 7px; }
  .chk {
    width: 20px; height: 20px; min-width: 20px;
    border-radius: 5px; border: 1.5px solid var(--borda);
    background: var(--entrada-bg); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .12s, border-color .12s; margin-top: 2px;
  }
  .chk.checked { background: var(--accent); border-color: var(--accent); }
  .chk.checked::after { content: '✓'; color: #fff; font-size: 12px; font-weight: 700; }

  .card-texto { flex: 1; font-size: .93rem; line-height: 1.4; word-break: break-word; }
  .card-texto.riscado { text-decoration: line-through; color: var(--fg2); }

  .card-right { display: flex; align-items: flex-start; gap: 4px; flex-shrink: 0; }

  .badge {
    font-size: .66rem; font-weight: 700; padding: 2px 6px;
    border-radius: 20px; white-space: nowrap;
  }
  .badge-alta    { background: var(--cor-alta);    color: #fff; }
  .badge-media   { background: var(--cor-media);   color: #1e1e2e; }
  .badge-baixa   { background: var(--cor-baixa);   color: #1e1e2e; }
  .badge-diario  { background: var(--cor-diario);  color: #fff; }
  .badge-semanal { background: var(--cor-semanal); color: #fff; }
  .badge-pendente   { background: var(--accent2); color: #fff; }
  .badge-concluida  { background: var(--fg-ok);   color: #1e1e2e; }

  .btn-del {
    background: none; border: none; color: var(--accent2);
    cursor: pointer; font-size: .95rem; padding: 0 2px; line-height: 1;
    transition: color .12s;
  }
  .btn-del:hover { color: #ff6b6b; }

  .card-radio-row { display: flex; align-items: center; gap: 2px; flex-wrap: wrap; padding-left: 27px; }
  .card-radio-row .lbl-ico { font-size: .75rem; color: var(--fg2); margin-right: 3px; }
  .cr-opt { display: flex; align-items: center; cursor: pointer; }
  .cr-opt input[type=radio] { display: none; }
  .cr-opt span {
    font-size: .75rem; padding: 1px 6px; border-radius: 20px;
    border: 1px solid transparent; transition: all .12s; cursor: pointer; user-select: none;
  }
  .cr-opt input:checked + span { font-weight: 700; border-color: currentColor; }

  .card-concl { font-size: .72rem; color: var(--fg-ok); padding-left: 27px; }

  /* Sub-tarefas */
  .subtarefas-wrap { padding-left: 27px; display: flex; flex-direction: column; gap: 4px; }
  .subtarefas-toggle {
    background: none; border: none; color: var(--fg2);
    font-family: 'Syne', sans-serif; font-size: .75rem; cursor: pointer;
    display: flex; align-items: center; gap: 4px; padding: 1px 0;
    transition: color .12s;
  }
  .subtarefas-toggle:hover { color: var(--fg); }
  .subtarefas-toggle .st-arrow { font-size: .65rem; transition: transform .15s; }
  .subtarefas-toggle.aberto .st-arrow { transform: rotate(90deg); }
  .subtarefas-lista { display: none; flex-direction: column; gap: 3px; }
  .subtarefas-lista.aberta { display: flex; }
  .subtarefa-item { display: flex; align-items: center; gap: 6px; }
  .subtarefa-chk {
    width: 15px; height: 15px; min-width: 15px;
    border-radius: 3px; border: 1.5px solid var(--borda);
    background: var(--entrada-bg); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .12s, border-color .12s;
  }
  .subtarefa-chk.checked { background: var(--fg-ok); border-color: var(--fg-ok); }
  .subtarefa-chk.checked::after { content: '✓'; color: #fff; font-size: 9px; font-weight: 700; }
  .subtarefa-txt { font-size: .8rem; color: var(--fg); flex: 1; word-break: break-word; }
  .subtarefa-txt.riscado { text-decoration: line-through; color: var(--fg2); }
  .btn-del-sub {
    background: none; border: none; color: var(--accent2);
    cursor: pointer; font-size: .8rem; padding: 0 2px; line-height: 1;
    transition: color .12s; flex-shrink: 0;
  }
  .btn-del-sub:hover { color: #ff6b6b; }
  .subtarefa-add-row { display: flex; gap: 5px; align-items: center; }
  .subtarefa-add-row input {
    flex: 1; background: var(--entrada-bg); border: none; border-radius: 5px;
    padding: 5px 8px; font-family: 'Syne', sans-serif; font-size: .78rem; color: var(--fg); outline: none;
  }
  .subtarefa-add-row input:focus { outline: 1px solid var(--accent); }
  .btn-add-sub {
    background: var(--accent); color: #fff; border: none; border-radius: 5px;
    padding: 4px 8px; font-size: .72rem; font-family: 'Syne', sans-serif; font-weight: 700;
    cursor: pointer; white-space: nowrap;
  }
  .btn-add-sub:hover { background: #6a5ae0; }

  /* Log de subtarefas no histórico */
  .log-sub { color: #a78bfa; }

  /* Rodapé lista */
  .rodape-lista { display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; flex-wrap: wrap; gap: 5px; }
  .btn-limpar {
    background: var(--bg2); border: 1px solid var(--borda); color: var(--fg2);
    font-family: 'Syne', sans-serif; font-size: .78rem; padding: 5px 11px;
    border-radius: 7px; cursor: pointer; transition: background .12s;
  }
  .btn-limpar:hover { background: var(--borda); color: var(--fg); }
  .prox-notif { font-family: 'JetBrains Mono', monospace; font-size: .75rem; color: var(--fg2); }

  /* Config notif */
  .cfg-notif {
    background: var(--bg2); border: 1px solid var(--borda); border-radius: 10px;
    padding: 7px 13px; display: flex; align-items: center; gap: 8px;
    flex-wrap: wrap; font-size: .78rem; color: var(--fg2); flex-shrink: 0;
  }
  .btn-toggle {
    padding: 2px 10px; border: none; border-radius: 20px;
    font-family: 'Syne', sans-serif; font-size: .76rem; font-weight: 700;
    cursor: pointer; transition: background .15s;
  }
  .btn-toggle.on  { background: var(--fg-ok);  color: #fff; }
  .btn-toggle.off { background: var(--accent2); color: #fff; }
  .cfg-notif input[type=number] {
    width: 48px; background: var(--entrada-bg); border: none; border-radius: 5px;
    color: var(--fg); font-family: 'JetBrains Mono', monospace; font-size: .78rem;
    padding: 3px 5px; text-align: center; outline: none;
  }
  .btn-aplicar {
    background: var(--accent); color: #fff; border: none; border-radius: 6px;
    padding: 3px 9px; font-family: 'Syne', sans-serif; font-size: .76rem; font-weight: 700;
    cursor: pointer; transition: background .15s;
  }
  .btn-aplicar:hover { background: #6a5ae0; }

  /* Histórico */
  .hist-sub { font-size: .78rem; color: var(--fg2); flex-shrink: 0; }
  .hist-scroll { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 7px; padding-right: 2px; }

  .hist-card {
    background: var(--bg2); border: 1px solid var(--borda);
    border-radius: 10px; padding: 9px 11px 7px;
  }
  .hist-topo { display: flex; align-items: flex-start; justify-content: space-between; gap: 7px; margin-bottom: 5px; }
  .hist-esq { display: flex; flex-direction: column; gap: 3px; flex: 1; }
  .hist-titulo { font-size: .93rem; font-weight: 700; }
  .hist-badges { display: flex; gap: 3px; flex-wrap: wrap; }
  .btn-reabrir {
    background: var(--bg); color: var(--accent); border: 1px solid var(--borda);
    border-radius: 6px; padding: 3px 9px; font-family: 'Syne', sans-serif;
    font-size: .75rem; font-weight: 700; cursor: pointer; white-space: nowrap;
    transition: background .12s;
  }
  .btn-reabrir:hover { background: var(--borda); }
  hr.sep2 { border: none; border-top: 1px solid var(--borda); margin: 3px 0; }

  .log-entry { display: flex; align-items: center; gap: 5px; font-size: .78rem; padding: 1px 0; }
  .log-ico { width: 16px; text-align: center; }
  .log-evt { font-weight: 700; min-width: 72px; }
  .log-qdo { color: var(--fg2); font-family: 'JetBrains Mono', monospace; font-size: .74rem; }
  .log-ok   { color: var(--fg-ok); }
  .log-warn { color: var(--fg-warn); }
  .log-norm { color: var(--fg2); }

  /* Pesquisa */
  .busca-wrap { display: flex; gap: 7px; flex-shrink: 0; }
  .busca-wrap input {
    flex: 1; background: var(--entrada-bg); border: none; border-radius: 7px;
    padding: 9px 11px; font-family: 'Syne', sans-serif; font-size: .93rem; color: var(--fg); outline: none;
  }
  .busca-wrap input:focus { outline: 2px solid var(--accent); }
  .btn-busca {
    background: var(--accent); color: #fff; border: none; border-radius: 7px;
    padding: 9px 13px; font-size: .95rem; cursor: pointer; transition: background .15s;
  }
  .btn-busca:hover { background: #6a5ae0; }
  .pesq-status { font-size: .78rem; color: var(--fg2); flex-shrink: 0; }
  .pesq-scroll { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 7px; padding-right: 2px; }

  .pesq-card { background: var(--bg2); border: 1px solid var(--borda); border-radius: 10px; padding: 9px 11px 7px; }
  .pesq-topo { display: flex; align-items: flex-start; justify-content: space-between; gap: 7px; margin-bottom: 5px; }
  .pesq-titulo { font-size: .93rem; font-weight: 700; flex: 1; word-break: break-word; }
  .pesq-titulo .match { background: var(--accent); color: #fff; border-radius: 3px; padding: 0 2px; }
  .pesq-badges { display: flex; gap: 3px; flex-wrap: wrap; flex-shrink: 0; }

  /* Popup */
  .popup-overlay {
    display: none; position: fixed; bottom: 14px; right: 14px;
    z-index: 9999; width: 300px;
  }
  .popup-overlay.show { display: block; animation: slideUp .2s ease; }
  @keyframes slideUp {
    from { transform: translateY(16px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }
  .popup-inner {
    background: var(--bg); border: 1px solid var(--accent);
    border-radius: 12px; padding: 13px 15px;
    box-shadow: 0 8px 28px rgba(0,0,0,.55);
  }
  .popup-titulo { font-weight: 700; font-size: .92rem; margin-bottom: 3px; }
  .popup-body   { font-size: .82rem; color: var(--fg2); margin-bottom: 2px; }
  .popup-urgente{ font-size: .78rem; color: var(--fg-warn); font-style: italic; margin-bottom: 9px; }
  .popup-ok {
    background: var(--accent); color: #fff; border: none; border-radius: 6px;
    padding: 4px 14px; font-family: 'Syne', sans-serif; font-weight: 700;
    cursor: pointer; float: right;
  }
  .popup-ok:hover { background: #6a5ae0; }

  .vazio { text-align: center; color: var(--fg2); font-size: .88rem; padding: 36px 0; }

  #inp-import-file { display: none; }

  /* ── ABA OPÇÕES ── */
  .opcoes-scroll { flex: 1; overflow-y: auto; padding-right: 2px; display: flex; flex-direction: column; gap: 12px; }
  .opcoes-secao {
    background: var(--bg2); border: 1px solid var(--borda);
    border-radius: 10px; padding: 14px 16px; display: flex; flex-direction: column; gap: 10px;
  }
  .opcoes-secao-titulo {
    font-size: .72rem; font-weight: 700; color: var(--fg2);
    text-transform: uppercase; letter-spacing: .08em; margin-bottom: 2px;
  }
  .opcoes-linha { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .opcoes-linha label { font-size: .85rem; color: var(--fg2); }

  .btn-opcao {
    border: none; border-radius: 7px;
    padding: 8px 14px; font-family: 'Syne', sans-serif; font-size: .83rem; font-weight: 600;
    cursor: pointer; transition: background .15s; display: flex; align-items: center; gap: 6px;
  }
  .btn-opcao-exportar { background: var(--bg); border: 1px solid var(--borda); color: var(--fg2); }
  .btn-opcao-exportar:hover { background: var(--borda); color: var(--fg); }
  .btn-opcao-importar { background: var(--bg); border: 1px solid var(--borda); color: var(--fg2); }
  .btn-opcao-importar:hover { background: var(--borda); color: var(--fg); }
  .btn-opcao-historico { background: var(--accent); color: #fff; }
  .btn-opcao-historico:hover { background: #6a5ae0; }
  .btn-opcao-deletar {
    background: var(--accent2); color: #fff; width: 100%;
    justify-content: center; padding: 10px 14px;
  }
  .btn-opcao-deletar:hover { background: #c0392b; }

  .opcoes-notif-wrap { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; font-size: .78rem; color: var(--fg2); }
  .opcoes-notif-wrap input[type=number] {
    width: 52px; background: var(--entrada-bg); border: none; border-radius: 5px;
    color: var(--fg); font-family: 'JetBrains Mono', monospace; font-size: .78rem;
    padding: 3px 5px; text-align: center; outline: none;
  }

  /* Log de subtarefas no histórico */
  .log-sub { color: #a78bfa; }

  /* Subtarefas indentadas no histórico */
  .hist-subs-secao {
    margin-top: 8px;
    border-left: 2px solid var(--borda);
    margin-left: 6px;
    padding-left: 12px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .hist-sub-bloco { display: flex; flex-direction: column; gap: 2px; }
  .hist-sub-header { display: flex; align-items: center; gap: 6px; }
  .hist-sub-ico { font-size: .8rem; flex-shrink: 0; }
  .hist-sub-label {
    font-size: .83rem; font-weight: 600; color: var(--fg);
    flex: 1; word-break: break-word; line-height: 1.3;
  }
  .hist-sub-label.riscado { text-decoration: line-through; color: var(--fg2); font-weight: 400; }
  .hist-sub-log {
    padding-left: 20px;
    display: flex; flex-direction: column; gap: 1px; margin-top: 1px;
  }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--borda); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;justify-content:center;gap:10px;padding:14px 0 13px;">
    <svg width="26" height="26" viewBox="0 0 14 14" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0;opacity:.8;">
      <rect x="0" y="0" width="6" height="6" rx="1.5" fill="none" stroke="#7c6af7" stroke-width="1.2"/>
      <path d="M1.5 3L2.8 4.3L4.8 1.8" stroke="#7c6af7" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <rect x="0" y="8" width="6" height="6" rx="1.5" fill="none" stroke="#4caf82" stroke-width="1.2"/>
      <path d="M1.5 11L2.8 12.3L4.8 9.8" stroke="#4caf82" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <rect x="8" y="0" width="6" height="6" rx="1.5" fill="none" stroke="#3a3a55" stroke-width="1.2"/>
      <rect x="8" y="8" width="6" height="6" rx="1.5" fill="none" stroke="#7c6af7" stroke-width="1.2" opacity=".4"/>
    </svg>
    <span style="font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;letter-spacing:.04em;color:#c8c8e0;">Lista de Tarefas</span>
  </div>
</header>

<div class="app">

  <div class="tabs">
    <button class="tab-btn ativa" onclick="mudarAba('tarefas')">Tarefas Pendentes</button>
    <button class="tab-btn"       onclick="mudarAba('pesquisa')">🔍 Pesquisar</button>
    <button class="tab-btn"       onclick="mudarAba('opcoes')">⚙ Opções</button>
  </div>

  <!-- ABA TAREFAS PENDENTES -->
  <div id="panel-tarefas" class="panel ativo">
    <div class="entrada-group">
      <div class="linha-input">
        <input id="inp-tarefa" type="text" placeholder="Nova tarefa…" autocomplete="off">
        <button class="btn-add" onclick="adicionarTarefa()">Adicionar</button>
      </div>
      <div class="radio-row">
        <label>Repetir:</label>
        <label class="radio-opt"><input type="radio" name="rep" value="Sem repetição" checked><span class="rep-sem">Sem repetição</span></label>
        <label class="radio-opt"><input type="radio" name="rep" value="Diariamente"><span class="rep-diario">Diariamente</span></label>
        <label class="radio-opt"><input type="radio" name="rep" value="Semanalmente"><span class="rep-semanal">Semanalmente</span></label>
      </div>
      <div class="radio-row">
        <label>Prioridade:</label>
        <label class="radio-opt"><input type="radio" name="pri" value="Alta"><span class="pri-alta">Alta</span></label>
        <label class="radio-opt"><input type="radio" name="pri" value="Média" checked><span class="pri-media">Média</span></label>
        <label class="radio-opt"><input type="radio" name="pri" value="Baixa"><span class="pri-baixa">Baixa</span></label>
      </div>
    </div>
    <div id="status-txt" class="status-txt"></div>
    <hr class="sep">
    <div id="lista-tarefas" class="lista-scroll"></div>
    <div class="rodape-lista">
      <button class="btn-limpar" onclick="limparConcluidas()">🧹 Limpar concluídas</button>
      <span id="prox-notif" class="prox-notif"></span>
    </div>
  </div>

  <!-- ABA HISTÓRICO (interno, sem aba própria) -->
  <div id="panel-historico" class="panel">
    <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
      <button class="btn-limpar" onclick="mudarAba('opcoes')" style="font-size:.75rem;padding:4px 10px;">← Voltar</button>
      <p class="hist-sub">Tarefas concluídas nos últimos 30 dias</p>
    </div>
    <hr class="sep">
    <div id="hist-lista" class="hist-scroll"></div>
  </div>

  <!-- ABA PESQUISA -->
  <div id="panel-pesquisa" class="panel">
    <div class="busca-wrap">
      <input id="inp-pesquisa" type="text" placeholder="Pesquisar tarefas…" autocomplete="off" oninput="executarPesquisa()">
      <button class="btn-busca" onclick="executarPesquisa()">🔍</button>
    </div>
    <p id="pesq-status" class="pesq-status">Digite para pesquisar…</p>
    <hr class="sep">
    <div id="pesq-lista" class="pesq-scroll"></div>
  </div>

  <!-- ABA OPÇÕES -->
  <div id="panel-opcoes" class="panel">
    <div class="opcoes-scroll">

      <!-- Seção Notificações -->
      <div class="opcoes-secao">
        <div class="opcoes-secao-titulo">🔔 Notificações</div>
        <div class="opcoes-notif-wrap">
          <span>Status:</span>
          <button id="btn-toggle-notif" class="btn-toggle on" onclick="toggleNotif()">● Ligadas</button>
          <span>Intervalo:</span>
          <input id="inp-intervalo" type="number" min="1" max="999" value="30">
          <span>min</span>
          <button class="btn-aplicar" onclick="aplicarIntervalo()">Aplicar</button>
          <span id="prox-notif-opcoes" style="font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--fg2);"></span>
        </div>
      </div>

      <!-- Seção Histórico -->
      <div class="opcoes-secao">
        <div class="opcoes-secao-titulo">📋 Histórico</div>
        <div class="opcoes-linha">
          <button class="btn-opcao btn-opcao-historico" onclick="mudarAba('historico')">📋 Ver Histórico (30 dias)</button>
        </div>
      </div>

      <!-- Seção Dados -->
      <div class="opcoes-secao">
        <div class="opcoes-secao-titulo">💾 Importar / Exportar</div>
        <div class="opcoes-linha">
          <button class="btn-opcao btn-opcao-exportar" onclick="exportarJSON()">⬇ Exportar JSON</button>
          <button class="btn-opcao btn-opcao-importar" onclick="document.getElementById('inp-import-file').click()">⬆ Importar JSON</button>
          <input type="file" id="inp-import-file" accept=".json" onchange="importarJSON(event)">
        </div>
      </div>

      <!-- Seção Perigo -->
      <div class="opcoes-secao" style="border-color: var(--accent2);">
        <div class="opcoes-secao-titulo" style="color:var(--accent2);">⚠ Zona de Perigo</div>
        <p style="font-size:.8rem;color:var(--fg2);line-height:1.5;">Esta ação remove <strong style="color:var(--fg)">todas as tarefas</strong> permanentemente e reinicia do zero. O histórico também será apagado.</p>
        <button class="btn-opcao btn-opcao-deletar" onclick="excluirTudo()">🗑 Excluir todas as tarefas</button>
      </div>

    </div>
  </div>

</div>

<!-- Popup -->
<div id="popup" class="popup-overlay">
  <div class="popup-inner">
    <div class="popup-titulo">⏰ Lembrete de Tarefas</div>
    <div id="popup-body"    class="popup-body"></div>
    <div id="popup-urgente" class="popup-urgente"></div>
    <button class="popup-ok" onclick="fecharPopup()">OK</button>
    <div style="clear:both"></div>
  </div>
</div>

<script>
const DIAS_HIST  = 30;
const PRIOR_ORD  = { Alta:0, Média:1, Baixa:2 };
const ICONES_LOG     = { Criada:['🕐','log-norm'], Concluída:['✅','log-ok'], Reaberta:['↩','log-warn'] };
const ICONES_LOG_SUB = { 'Sub criada':['🕐','log-norm'], 'Sub concluída':['✅','log-ok'], 'Sub reaberta':['↩','log-warn'], 'Sub removida':['🗑','log-warn'] };

let tarefas=[], historico=[], cfg={ notificacoes_ligadas:true, intervalo_minutos:30 };
let popupAberto=false, proxNotif=0;

/* ── Persistência ─────────────────────────────── */
function carregarDados(){
  try{
    const raw=localStorage.getItem('tarefas_app');
    if(!raw) return;
    const d=JSON.parse(raw);
    if(Array.isArray(d)){ tarefas=d; historico=[]; }
    else{ tarefas=d.tarefas||[]; historico=d.historico||[]; cfg=Object.assign(cfg,d.config||{}); }
    tarefas.forEach(t=>{
      if(!t.criado_em) t.criado_em=agora();
      if(!t.repeticao) t.repeticao='Sem repetição';
      if(!t.prioridade) t.prioridade='Média';
      if(!t.log) t.log=[{evento:'Criada',quando:t.criado_em}];
      if(!t.subtarefas) t.subtarefas=[];
      t.subtarefas.forEach(st=>{ if(!st.log) st.log=[{evento:'Sub criada',quando:t.criado_em||agora()}]; if(!st.criado_em) st.criado_em=t.criado_em||agora(); });
    });
    historico=purgarHist(historico);
  }catch(e){}
}
function salvarDados(){ localStorage.setItem('tarefas_app',JSON.stringify({tarefas,historico,config:cfg})); }

function purgarHist(h){
  const lim=Date.now()-DIAS_HIST*86400000;
  return h.filter(x=>{
    // usa a data de criação como referência — expira 30 dias após criação
    const ref=parseD(x.criado_em||'') || (x.log&&x.log.length?parseD(x.log[0].quando):0);
    return ref>=lim;
  });
}
function agora(){
  const d=new Date(),p=n=>String(n).padStart(2,'0');
  return `${p(d.getDate())}/${p(d.getMonth()+1)}/${d.getFullYear()} ${p(d.getHours())}:${p(d.getMinutes())}`;
}
function parseD(s){
  if(!s) return 0;
  const m=s.match(/(\d{2})\/(\d{2})\/(\d{4}) (\d{2}):(\d{2})/);
  return m ? new Date(+m[3],+m[2]-1,+m[1],+m[4],+m[5]).getTime() : 0;
}

/* ── Abas ─────────────────────────────────────── */
function mudarAba(aba){
  const abas=['tarefas','historico','pesquisa','opcoes'];
  // Botões visíveis na barra (sem historico)
  const botoes=['tarefas','pesquisa','opcoes'];
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('ativa',botoes[i]===aba));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('ativo'));
  document.getElementById('panel-'+aba).classList.add('ativo');
  if(aba==='historico') renderHistorico();
  if(aba==='pesquisa'){ document.getElementById('inp-pesquisa').focus(); executarPesquisa(); }
}

/* ── Repetição ao iniciar ─────────────────────── */
function verificarRepeticoes(){
  const hoje=new Date(); hoje.setHours(0,0,0,0);
  const novas=[];
  tarefas.forEach(t=>{
    const rep=t.repeticao||'Sem repetição';
    if(rep==='Sem repetição'||!t.concluida||!t.concluida_em) return;
    const dc=new Date(parseD(t.concluida_em)); dc.setHours(0,0,0,0);
    const diff=(hoje-dc)/86400000;
    if(rep==='Diariamente'&&diff>=1) novas.push(clonarPend(t));
    else if(rep==='Semanalmente'&&diff>=7) novas.push(clonarPend(t));
  });
  if(novas.length){ tarefas.push(...novas); salvarDados(); }
}
function clonarPend(t){ const a=agora(); return{texto:t.texto,concluida:false,concluida_em:null,criado_em:a,repeticao:t.repeticao||'Sem repetição',prioridade:t.prioridade||'Média',log:[{evento:'Criada',quando:a}],subtarefas:[]}; }

/* ── Render lista ─────────────────────────────── */
function pendentes(){ return tarefas.filter(t=>!t.concluida).length; }

function renderLista(){
  const elLista=document.getElementById('lista-tarefas');
  elLista.innerHTML='';
  document.getElementById('status-txt').textContent=`${pendentes()} pendente(s) · ${tarefas.length} no total`;
  if(!tarefas.length){ elLista.innerHTML='<div class="vazio">Nenhuma tarefa ainda. Adicione uma acima!</div>'; return; }
  const sorted=[...tarefas].sort((a,b)=>{
    const ca=a.concluida?1:0,cb=b.concluida?1:0; if(ca!==cb) return ca-cb;
    const pa=PRIOR_ORD[a.prioridade||'Média']??1, pb=PRIOR_ORD[b.prioridade||'Média']??1; if(pa!==pb) return pa-pb;
    return (a.criado_em||'').localeCompare(b.criado_em||'');
  });
  sorted.forEach(t=>{ const idx=tarefas.indexOf(t); elLista.appendChild(mkCard(idx,t)); });
}

function mkCard(idx,t){
  const rep=t.repeticao||'Sem repetição', prior=t.prioridade||'Média';
  const cP={Alta:'alta',Média:'media',Baixa:'baixa'}[prior];
  const cR={Sem_rep:null,Diariamente:'diario',Semanalmente:'semanal'}[rep.replace(' repetição','_rep')]||null;

  const div=el('div','card'+(t.concluida?' concluida':''));
  div.setAttribute('data-prior',prior);

  // topo
  const topo=el('div','card-topo');
  const chk=el('div','chk'+(t.concluida?' checked':'')); chk.onclick=()=>toggleTarefa(idx);
  const txt=el('div','card-texto'+(t.concluida?' riscado':'')); txt.textContent=t.texto;
  const right=el('div','card-right');
  if(!t.concluida){ const b=el('span',`badge badge-${cP}`); b.textContent=prior; right.appendChild(b); }
  if(cR){ const b=el('span',`badge badge-${cR}`); b.textContent='🔁 '+rep; right.appendChild(b); }
  const del=el('button','btn-del'); del.textContent='✕'; del.onclick=()=>removerTarefa(idx);
  right.append(del);
  topo.append(chk,txt,right);

  // radio repetição
  const linhaR=el('div','card-radio-row'); linhaR.innerHTML='<span class="lbl-ico">🔁</span>';
  [['Sem repetição','rep-sem'],['Diariamente','rep-diario'],['Semanalmente','rep-semanal']].forEach(([val,cls])=>{
    const lbl=el('label','cr-opt');
    const inp=document.createElement('input'); inp.type='radio'; inp.name=`rep-${idx}`; inp.value=val;
    if((t.repeticao||'Sem repetição')===val) inp.checked=true;
    inp.onchange=()=>{ tarefas[idx].repeticao=val; salvarDados(); renderLista(); };
    const sp=el('span',cls); sp.textContent=val;
    lbl.append(inp,sp); linhaR.appendChild(lbl);
  });

  // radio prioridade
  const linhaP=el('div','card-radio-row'); linhaP.innerHTML='<span class="lbl-ico">⚑</span>';
  [['Alta','pri-alta'],['Média','pri-media'],['Baixa','pri-baixa']].forEach(([val,cls])=>{
    const lbl=el('label','cr-opt');
    const inp=document.createElement('input'); inp.type='radio'; inp.name=`pri-${idx}`; inp.value=val;
    if((t.prioridade||'Média')===val) inp.checked=true;
    inp.onchange=()=>{ tarefas[idx].prioridade=val; salvarDados(); renderLista(); };
    const sp=el('span',cls); sp.textContent=val;
    lbl.append(inp,sp); linhaP.appendChild(lbl);
  });

  div.append(topo,linhaR,linhaP);

  // ── Subtarefas ──
  if(!t.subtarefas) t.subtarefas=[];
  const stWrap=el('div','subtarefas-wrap');
  const stToggle=el('button','subtarefas-toggle');
  const stArrow=el('span','st-arrow'); stArrow.textContent='▶';
  const stLabelTxt=document.createTextNode(` Subtarefas (${t.subtarefas.length})`);
  stToggle.append(stArrow,stLabelTxt);
  const stLista=el('div','subtarefas-lista');

  stToggle.onclick=()=>{
    const aberto=stLista.classList.toggle('aberta');
    stToggle.classList.toggle('aberto',aberto);
  };

  function renderSubtarefas(){
    stLista.innerHTML='';
    stLabelTxt.nodeValue=` Subtarefas (${t.subtarefas.length})`;
    t.subtarefas.forEach((st,si)=>{
      const row=el('div','subtarefa-item');
      const schk=el('div','subtarefa-chk'+(st.concluida?' checked':''));
      schk.onclick=()=>{
        const a=agora();
        st.concluida=!st.concluida;
        if(!st.log) st.log=[];
        if(st.concluida){ st.concluida_em=a; st.log.push({evento:'Sub concluída',quando:a,subtarefa:st.texto}); }
        else{ st.concluida_em=null; st.log.push({evento:'Sub reaberta',quando:a,subtarefa:st.texto}); }
        if(!t.log) t.log=[];
        t.log.push({evento:st.concluida?'Sub concluída':'Sub reaberta',quando:a,subtarefa:st.texto});
        salvarDados(); renderSubtarefas();
      };
      const stxt=el('span','subtarefa-txt'+(st.concluida?' riscado':'')); stxt.textContent=st.texto;
      const sdel=el('button','btn-del-sub'); sdel.textContent='✕';
      sdel.onclick=()=>{
        const a=agora();
        if(!t.log) t.log=[];
        t.log.push({evento:'Sub removida',quando:a,subtarefa:st.texto});
        t.subtarefas.splice(si,1);
        salvarDados(); renderSubtarefas();
      };
      row.append(schk,stxt,sdel);
      stLista.appendChild(row);
    });
    // linha de adição
    const addRow=el('div','subtarefa-add-row');
    const addInp=document.createElement('input'); addInp.type='text'; addInp.placeholder='Nova subtarefa…'; addInp.autocomplete='off';
    const addBtn=el('button','btn-add-sub'); addBtn.textContent='+ Add';
    const doAdd=()=>{
      const v=addInp.value.trim(); if(!v) return;
      const a=agora();
      const nova={texto:v,concluida:false,criado_em:a,concluida_em:null,log:[{evento:'Sub criada',quando:a,subtarefa:v}]};
      t.subtarefas.push(nova);
      if(!t.log) t.log=[];
      t.log.push({evento:'Sub criada',quando:a,subtarefa:v});
      salvarDados(); renderSubtarefas();
      addInp.value='';
    };
    addBtn.onclick=doAdd;
    addInp.addEventListener('keydown',e=>{ if(e.key==='Enter') doAdd(); });
    addRow.append(addInp,addBtn);
    stLista.appendChild(addRow);
  }

  renderSubtarefas();
  stWrap.append(stToggle,stLista);
  div.appendChild(stWrap);

  if(t.concluida&&t.concluida_em){ const ci=el('div','card-concl'); ci.textContent=`✅ Concluída em ${t.concluida_em}`; div.appendChild(ci); }
  return div;
}

/* ── Ações tarefas ────────────────────────────── */
function adicionarTarefa(){
  const txt=document.getElementById('inp-tarefa').value.trim(); if(!txt) return;
  const a=agora();
  const rep=document.querySelector('input[name="rep"]:checked')?.value||'Sem repetição';
  const pri=document.querySelector('input[name="pri"]:checked')?.value||'Média';
  tarefas.push({texto:txt,concluida:false,concluida_em:null,criado_em:a,repeticao:rep,prioridade:pri,log:[{evento:'Criada',quando:a}],subtarefas:[]});
  salvarDados();
  document.getElementById('inp-tarefa').value='';
  document.querySelector('input[name="rep"][value="Sem repetição"]').checked=true;
  document.querySelector('input[name="pri"][value="Média"]').checked=true;
  renderLista();
}

function toggleTarefa(idx){
  const t=tarefas[idx], a=agora();
  t.concluida=!t.concluida;
  if(!t.log) t.log=[{evento:'Criada',quando:t.criado_em||a}];
  if(t.concluida){
    t.concluida_em=a; t.log.push({evento:'Concluída',quando:a});
    let h=historico.find(x=>x.criado_em===t.criado_em&&x.texto===t.texto);
    if(!h){ h={texto:t.texto,criado_em:t.criado_em||a,concluida_em:a,repeticao:t.repeticao||'Sem repetição',prioridade:t.prioridade||'Média',log:[...t.log],subtarefas:JSON.parse(JSON.stringify(t.subtarefas||[]))}; historico.push(h); }
    else{ h.concluida_em=a; h.log=[...t.log]; h.subtarefas=JSON.parse(JSON.stringify(t.subtarefas||[])); }
    historico=purgarHist(historico);
  } else {
    t.concluida_em=null; t.log.push({evento:'Reaberta',quando:a});
    const h=historico.find(x=>x.criado_em===t.criado_em&&x.texto===t.texto);
    if(h){ h.log=[...t.log]; h.concluida_em=null; }
  }
  salvarDados(); renderLista();
}

function removerTarefa(idx){
  const t=tarefas[idx];
  if(!t.concluida){
    const hi=historico.findIndex(h=>h.criado_em===t.criado_em&&h.texto===t.texto);
    if(hi!==-1) historico.splice(hi,1);
  }
  tarefas.splice(idx,1); salvarDados(); renderLista();
}
function limparConcluidas(){ tarefas=tarefas.filter(t=>!t.concluida); salvarDados(); renderLista(); }

/* ── Excluir tudo ─────────────────────────────── */
function excluirTudo(){
  const ok=confirm('⚠ Tem certeza? Isso vai apagar TODAS as tarefas e o histórico permanentemente. Esta ação não pode ser desfeita.');
  if(!ok) return;
  tarefas=[]; historico=[];
  salvarDados(); renderLista();
  alert('✅ Tudo apagado. Começando do zero!');
}

/* ── Histórico ────────────────────────────────── */
function renderHistorico(){
  const elH=document.getElementById('hist-lista'); elH.innerHTML='';
  const sorted=[...historico].sort((a,b)=>{
    const la=a.log?.length?parseD(a.log[a.log.length-1].quando):parseD(a.criado_em||'');
    const lb=b.log?.length?parseD(b.log[b.log.length-1].quando):parseD(b.criado_em||'');
    return lb-la;
  });
  if(!sorted.length){ elH.innerHTML='<div class="vazio">Nenhuma tarefa nos últimos 30 dias.</div>'; return; }
  sorted.forEach(item=>elH.appendChild(mkHistCard(item)));
}

function mkHistCard(item){
  const rep=item.repeticao||'Sem repetição', prior=item.prioridade||'Média';
  const cP={Alta:'alta',Média:'media',Baixa:'baixa'}[prior];
  const cR={Sem_rep:null,Diariamente:'diario',Semanalmente:'semanal'}[rep.replace(' repetição','_rep')]||null;
  const ativa=item.concluida_em===null||item.concluida_em===undefined;

  const card=el('div','hist-card');
  const topo=el('div','hist-topo');
  const esq=el('div','hist-esq');
  const titulo=el('div','hist-titulo'); titulo.textContent=item.texto;
  const badges=el('div','hist-badges');
  const bp=el('span',`badge badge-${cP}`); bp.textContent=`⚑ ${prior}`; badges.appendChild(bp);
  if(cR){ const br=el('span',`badge badge-${cR}`); br.textContent=`🔁 ${rep}`; badges.appendChild(br); }
  if(ativa){ const ba=el('span','badge badge-pendente'); ba.textContent='pendente'; badges.appendChild(ba); }
  esq.append(titulo,badges); topo.appendChild(esq);
  if(!ativa){ const btn=el('button','btn-reabrir'); btn.textContent='↩ Reabrir'; btn.onclick=()=>reabrirTarefa(item); topo.appendChild(btn); }
  card.appendChild(topo);

  const sep=document.createElement('hr'); sep.className='sep2'; card.appendChild(sep);

  // ── Log da tarefa pai (apenas eventos da tarefa, não de subtarefas) ──
  let log=item.log||[];
  if(!log.length){ if(item.criado_em) log=[{evento:'Criada',quando:item.criado_em}]; if(item.concluida_em) log.push({evento:'Concluída',quando:item.concluida_em}); }
  const logPai=log.filter(e=>e.subtarefa===undefined);
  logPai.forEach(e=>{
    const [ico,cls]=ICONES_LOG[e.evento]||['•','log-norm'];
    const row=el('div','log-entry');
    const icoSpan=el('span','log-ico'); icoSpan.textContent=ico;
    const evtSpan=el('span',`log-evt ${cls}`); evtSpan.style.minWidth='90px'; evtSpan.textContent=e.evento;
    const qdoSpan=el('span','log-qdo'); qdoSpan.textContent=e.quando;
    row.append(icoSpan,evtSpan,qdoSpan);
    card.appendChild(row);
  });

  // ── Subtarefas indentadas ──
  const subs=item.subtarefas||[];
  if(subs.length){
    const secao=el('div','hist-subs-secao');
    subs.forEach(st=>{
      const bloco=el('div','hist-sub-bloco');
      // cabeçalho da subtarefa
      const header=el('div','hist-sub-header');
      const ico=el('span','hist-sub-ico'); ico.textContent=st.concluida?'✅':'⬜';
      const label=el('span','hist-sub-label'+(st.concluida?' riscado':'')); label.textContent=st.texto;
      header.append(ico,label);
      bloco.appendChild(header);
      // log da subtarefa
      const stLog=st.log||[];
      if(stLog.length){
        const logWrap=el('div','hist-sub-log');
        stLog.forEach(e=>{
          const [eIco,eCls]=ICONES_LOG_SUB[e.evento]||['•','log-norm'];
          const row=el('div','log-entry');
          const icoSpan=el('span','log-ico'); icoSpan.style.fontSize='.72rem'; icoSpan.textContent=eIco;
          const evtSpan=el('span',`log-evt ${eCls}`); evtSpan.style.cssText='font-size:.72rem;min-width:90px;'; evtSpan.textContent=e.evento;
          const qdoSpan=el('span','log-qdo'); qdoSpan.style.fontSize='.7rem'; qdoSpan.textContent=e.quando;
          row.append(icoSpan,evtSpan,qdoSpan);
          logWrap.appendChild(row);
        });
        bloco.appendChild(logWrap);
      }
      secao.appendChild(bloco);
    });
    card.appendChild(secao);
  }

  return card;
}

function reabrirTarefa(item){
  const a=agora(), logAtual=[...(item.log||[])]; logAtual.push({evento:'Reaberta',quando:a});
  const h=historico.find(x=>x.criado_em===item.criado_em&&x.texto===item.texto);
  if(h){ h.log=logAtual; h.concluida_em=null; }
  // preserva subtarefas com seus estados e logs
  const subsCopia=JSON.parse(JSON.stringify(item.subtarefas||[]));
  tarefas.push({texto:item.texto,concluida:false,concluida_em:null,criado_em:item.criado_em||a,repeticao:item.repeticao||'Sem repetição',prioridade:item.prioridade||'Média',log:logAtual,subtarefas:subsCopia});
  salvarDados(); renderLista(); renderHistorico();
}

/* ── Pesquisa ─────────────────────────────────── */
function executarPesquisa(){
  const container=document.getElementById('pesq-lista'); container.innerHTML='';
  const termo=document.getElementById('inp-pesquisa').value.trim().toLowerCase();
  if(!termo){ document.getElementById('pesq-status').textContent='Digite para pesquisar…'; return; }

  const pool={};
  tarefas.forEach(t=>{ const k=t.texto+'|'+(t.criado_em||''); if(!pool[k]) pool[k]={texto:t.texto,criado_em:t.criado_em||'',concluida_em:t.concluida_em,repeticao:t.repeticao||'Sem repetição',prioridade:t.prioridade||'Média',log:t.log||[],concluida:t.concluida,subtarefas:t.subtarefas||[]}; });
  historico.forEach(h=>{ const k=h.texto+'|'+(h.criado_em||''); if(!pool[k]) pool[k]={texto:h.texto,criado_em:h.criado_em||'',concluida_em:h.concluida_em,repeticao:h.repeticao||'Sem repetição',prioridade:h.prioridade||'Média',log:h.log||[],concluida:!!h.concluida_em,subtarefas:h.subtarefas||[]}; });

  function destacar(texto, termo){
    const idx=texto.toLowerCase().indexOf(termo);
    if(idx<0) return esc(texto);
    return esc(texto.slice(0,idx))+`<span style="background:var(--accent);color:#fff;border-radius:3px;padding:0 2px">${esc(texto.slice(idx,idx+termo.length))}</span>`+esc(texto.slice(idx+termo.length));
  }

  const res=Object.values(pool).filter(v=>
    v.texto.toLowerCase().includes(termo) ||
    (v.subtarefas||[]).some(st=>st.texto.toLowerCase().includes(termo))
  ).sort((a,b)=>{ const la=a.log.length?parseD(a.log[a.log.length-1].quando):parseD(a.criado_em); const lb=b.log.length?parseD(b.log[b.log.length-1].quando):parseD(b.criado_em); return lb-la; });

  document.getElementById('pesq-status').textContent=`${res.length} resultado(s) para "${document.getElementById('inp-pesquisa').value.trim()}"`;
  if(!res.length){ container.innerHTML='<div class="vazio">Nenhuma tarefa encontrada.</div>'; return; }

  res.forEach(item=>{
    const rep=item.repeticao||'Sem repetição', prior=item.prioridade||'Média';
    const cP={Alta:'alta',Média:'media',Baixa:'baixa'}[prior];
    const cR={Sem_rep:null,Diariamente:'diario',Semanalmente:'semanal'}[rep.replace(' repetição','_rep')]||null;

    const card=el('div','card'+(item.concluida?' concluida':''));
    card.setAttribute('data-prior',prior);

    // topo
    const topo=el('div','card-topo');
    const chk=el('div','chk'+(item.concluida?' checked':'')); chk.style.cursor='default';
    const txt=el('div','card-texto'+(item.concluida?' riscado':''));
    txt.innerHTML=destacar(item.texto, termo);
    const right=el('div','card-right');
    // badge de status
    const bStatus=el('span','badge '+(item.concluida?'badge-concluida':'badge-pendente'));
    bStatus.textContent=item.concluida?'✅ Concluída':'⏳ Pendente';
    right.appendChild(bStatus);
    if(!item.concluida){ const b=el('span',`badge badge-${cP}`); b.textContent=prior; right.appendChild(b); }
    if(cR){ const b=el('span',`badge badge-${cR}`); b.textContent='🔁 '+rep; right.appendChild(b); }
    topo.append(chk,txt,right);
    card.appendChild(topo);

    // subtarefas — exibe todas, destaca as que batem com o termo
    const subs=(item.subtarefas||[]);
    if(subs.length){
      const stWrap=el('div','subtarefas-wrap'); stWrap.style.marginTop='2px';
      subs.forEach(st=>{
        const row=el('div','subtarefa-item');
        const schk=el('div','subtarefa-chk'+(st.concluida?' checked':'')); schk.style.cursor='default';
        const stxt=el('span','subtarefa-txt'+(st.concluida?' riscado':''));
        stxt.innerHTML=destacar(st.texto, termo);
        row.append(schk,stxt);
        stWrap.appendChild(row);
      });
      card.appendChild(stWrap);
    }

    if(item.concluida&&item.concluida_em){ const ci=el('div','card-concl'); ci.textContent=`✅ Concluída em ${item.concluida_em}`; card.appendChild(ci); }
    container.appendChild(card);
  });
}

/* ── Notificações ─────────────────────────────── */
function toggleNotif(){
  cfg.notificacoes_ligadas=!cfg.notificacoes_ligadas;
  const btn=document.getElementById('btn-toggle-notif');
  if(cfg.notificacoes_ligadas){ btn.textContent='● Ligadas'; btn.className='btn-toggle on'; proxNotif=Date.now()+cfg.intervalo_minutos*60000; }
  else{ btn.textContent='○ Desligadas'; btn.className='btn-toggle off'; }
  salvarDados(); atualizarCd();
}
function aplicarIntervalo(){
  let v=parseInt(document.getElementById('inp-intervalo').value)||30; if(v<1) v=1;
  cfg.intervalo_minutos=v; document.getElementById('inp-intervalo').value=v;
  proxNotif=Date.now()+v*60000; salvarDados(); atualizarCd();
}
function atualizarCd(){
  const elPn=document.getElementById('prox-notif');
  const elPnO=document.getElementById('prox-notif-opcoes');
  if(!cfg.notificacoes_ligadas||pendentes()===0){ if(elPn) elPn.textContent=''; if(elPnO) elPnO.textContent=''; return; }
  const rest=Math.max(0,Math.floor((proxNotif-Date.now())/1000));
  const txt=`⏰ Próximo aviso: ${String(Math.floor(rest/60)).padStart(2,'0')}:${String(rest%60).padStart(2,'0')}`;
  if(elPn) elPn.textContent=txt;
  if(elPnO) elPnO.textContent=txt;
}
function mostrarPopup(p,urgente){
  if(popupAberto) return; popupAberto=true;
  document.getElementById('popup-body').textContent=`Você tem ${p} tarefa(s) pendente(s)!`;
  const u=urgente?(urgente.length>38?urgente.slice(0,38)+'…':urgente):'';
  document.getElementById('popup-urgente').textContent=u?`📌 ${u}`:'';
  document.getElementById('popup').classList.add('show');
  if(Notification.permission==='granted') new Notification('⏰ Lembrete de Tarefas',{body:`Você tem ${p} tarefa(s) pendente(s)!`+(u?`\n📌 ${u}`:'')});
}
function fecharPopup(){ document.getElementById('popup').classList.remove('show'); popupAberto=false; }

/* ── Export / Import JSON ─────────────────────── */
function exportarJSON(){
  const dados = { tarefas, historico, config: cfg };
  const blob = new Blob([JSON.stringify(dados, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'tarefas.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importarJSON(event){
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const dados = JSON.parse(e.target.result);
      if (!dados.tarefas) { alert('Arquivo inválido: sem campo "tarefas".'); return; }
      tarefas   = dados.tarefas   || [];
      historico = dados.historico || [];
      cfg       = dados.config    || { notificacoes_ligadas: true, intervalo_minutos: 30 };
      salvarDados();
      const btn = document.getElementById('btn-toggle-notif');
      if (cfg.notificacoes_ligadas){ btn.textContent='● Ligadas'; btn.className='btn-toggle on'; }
      else { btn.textContent='○ Desligadas'; btn.className='btn-toggle off'; }
      document.getElementById('inp-intervalo').value = cfg.intervalo_minutos;
      renderLista();
      alert(`✅ Importado: ${tarefas.length} tarefa(s), ${historico.length} no histórico.`);
    } catch { alert('Erro ao ler o arquivo JSON.'); }
    event.target.value = '';
  };
  reader.readAsText(file);
}

/* ── Util ─────────────────────────────────────── */
function el(tag,cls){ const e=document.createElement(tag); if(cls) e.className=cls; return e; }
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ── Init ─────────────────────────────────────── */
document.getElementById('inp-tarefa').addEventListener('keydown',e=>{ if(e.key==='Enter') adicionarTarefa(); });
document.getElementById('inp-pesquisa').addEventListener('keydown',e=>{ if(e.key==='Enter') executarPesquisa(); });

(function init(){
  carregarDados();
  const btn=document.getElementById('btn-toggle-notif');
  if(!cfg.notificacoes_ligadas){ btn.textContent='○ Desligadas'; btn.className='btn-toggle off'; }
  document.getElementById('inp-intervalo').value=cfg.intervalo_minutos;
  verificarRepeticoes();
  renderLista();
  proxNotif=Date.now()+cfg.intervalo_minutos*60000;
  setInterval(atualizarCd,1000);
  setInterval(()=>{
    if(!cfg.notificacoes_ligadas) return;
    if(Date.now()>=proxNotif){
      proxNotif=Date.now()+cfg.intervalo_minutos*60000;
      const p=pendentes();
      if(p>0){
        const urg=tarefas.filter(t=>!t.concluida).sort((a,b)=>(PRIOR_ORD[a.prioridade||'Média']??1)-(PRIOR_ORD[b.prioridade||'Média']??1));
        mostrarPopup(p,urg[0]?.texto||null);
      }
    }
  },1000);
  if('Notification'in window&&Notification.permission==='default') Notification.requestPermission();
})();
</script>
